<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal — Les Chouchous Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Ubuntu Mono', 'Courier New', monospace;
            overflow: hidden;
        }

        /* ── WINDOW CHROME ── */
        .window {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #2d2d2d;
            border-radius: 0;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        /* Title bar */
        .titlebar {
            background: #3c3c3c;
            height: 32px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            flex-shrink: 0;
            user-select: none;
            border-bottom: 1px solid #1a1a1a;
        }

        .win-buttons {
            display: flex;
            gap: 6px;
            margin-right: 12px;
        }

        .win-btn {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            position: relative;
            transition: filter 0.15s;
        }
        .win-btn:hover { filter: brightness(1.2); }

        .win-btn.close   { background: #e05c5c; box-shadow: 0 0 0 1px #c0392b44; }
        .win-btn.min     { background: #e0a050; box-shadow: 0 0 0 1px #d68c2844; }
        .win-btn.max     { background: #50c050; box-shadow: 0 0 0 1px #27ae6044; }

        .win-btn.close::before, .win-btn.close::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 7px; height: 1px;
            background: #8b0000;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .win-btn.close:hover::before { opacity: 1; transform: translate(-50%,-50%) rotate(45deg); }
        .win-btn.close:hover::after  { opacity: 1; transform: translate(-50%,-50%) rotate(-45deg); }

        .titlebar-title {
            flex: 1;
            text-align: center;
            color: #c0c0c0;
            font-size: 13px;
            letter-spacing: 0.02em;
        }

        .titlebar-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: #888;
        }

        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #666;
        }
        .status-dot.online {
            background: #4ec94e;
            box-shadow: 0 0 6px #4ec94e;
            animation: blink-dot 2.5s ease-in-out infinite;
        }
        @keyframes blink-dot {
            0%,100% { opacity:1; } 50% { opacity:0.4; }
        }

        /* Menu bar */
        .menubar {
            background: #3c3c3c;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            height: 26px;
            padding: 0 6px;
            flex-shrink: 0;
        }

        .menu-item {
            padding: 3px 10px;
            font-size: 12px;
            color: #d0d0d0;
            cursor: pointer;
            border-radius: 3px;
            transition: background 0.1s;
            position: relative;
        }
        .menu-item:hover { background: #555; }
        .menu-item.active { background: #e07030; color: #fff; }

        .menu-sep {
            width: 1px; height: 14px;
            background: #555;
            margin: 0 4px;
        }

        .menu-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .menu-badge {
            background: #444;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 11px;
            color: #aaa;
        }

        .menu-btn {
            background: #444;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 11px;
            color: #ccc;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }
        .menu-btn:hover { background: #c0392b; border-color: #e05c5c; color: #fff; }

        /* ── TERMINAL BODY ── */
        .terminal {
            flex: 1;
            background: #2d2d2d;
            overflow-y: auto;
            padding: 8px 0;
            scrollbar-width: thin;
            scrollbar-color: #555 #2d2d2d;
            position: relative;
        }
        .terminal::-webkit-scrollbar { width: 8px; }
        .terminal::-webkit-scrollbar-track { background: #2d2d2d; }
        .terminal::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
        .terminal::-webkit-scrollbar-thumb:hover { background: #666; }

        /* Log line */
        .line {
            display: flex;
            min-height: 20px;
            padding: 0 12px;
            font-size: 13px;
            line-height: 1.55;
            color: #d3d7cf;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .line:hover { background: rgba(255,255,255,0.03); }

        .prompt {
            color: #75b64d;
            flex-shrink: 0;
            margin-right: 0;
            user-select: none;
        }
        .prompt-user  { color: #75b64d; }
        .prompt-at    { color: #d3d7cf; }
        .prompt-host  { color: #729fcf; }
        .prompt-sep   { color: #d3d7cf; }
        .prompt-path  { color: #75b64d; }
        .prompt-arrow { color: #d3d7cf; margin-right: 6px; }

        .msg { flex: 1; }

        /* Color classes */
        .c-success .msg { color: #4ec94e; }
        .c-error   .msg { color: #e05c5c; }
        .c-warning .msg { color: #e0a050; }
        .c-info    .msg { color: #729fcf; }
        .c-web     .msg { color: #c586c0; }
        .c-dim     .msg { color: #888; }

        /* Cursor line */
        .cursor-line {
            display: flex;
            align-items: center;
            padding: 0 12px;
            min-height: 20px;
            font-size: 13px;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: #d3d7cf;
            margin-left: 2px;
            vertical-align: middle;
            animation: blink-cursor 1.1s step-end infinite;
        }
        @keyframes blink-cursor {
            0%,100% { opacity: 1; }
            50%      { opacity: 0; }
        }

        /* Status bar */
        .statusbar {
            background: #1a1a1a;
            border-top: 1px solid #111;
            height: 22px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 16px;
            flex-shrink: 0;
        }

        .sb-item {
            font-size: 11px;
            color: #777;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .sb-item.highlight { color: #4ec94e; }
        .sb-item.right { margin-left: auto; }

        /* Scroll-to-bottom pill */
        .scroll-pill {
            position: fixed;
            bottom: 32px;
            right: 16px;
            background: #e07030;
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            display: none;
            box-shadow: 0 2px 12px rgba(0,0,0,0.5);
            transition: background 0.2s;
        }
        .scroll-pill.visible { display: block; }
        .scroll-pill:hover { background: #c05010; }
    </style>
</head>
<body>

<div class="window">

    <!-- Title bar -->
    <div class="titlebar">
        <div class="win-buttons">
            <button class="win-btn close"  title="Fermer"></button>
            <button class="win-btn min"    title="Réduire"></button>
            <button class="win-btn max"    title="Agrandir"></button>
        </div>
        <div class="titlebar-title">Terminal — bot@chouchous: ~</div>
        <div class="titlebar-status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusLabel">Connexion...</span>
        </div>
    </div>

    <!-- Menu bar -->
    <div class="menubar">
        <div class="menu-item">Fichier</div>
        <div class="menu-item">Éditer</div>
        <div class="menu-item">Affichage</div>
        <div class="menu-item active">Terminal</div>
        <div class="menu-item">Aide</div>
        <div class="menu-sep"></div>
        <div class="menu-item" onclick="toggleTimestamps()" id="tsToggle">⏱ Timestamps OFF</div>

        <div class="menu-right">
            <span class="menu-badge" id="logCountBadge">0 lignes</span>
            <button class="menu-btn" onclick="clearTerminal()">🗑 Effacer</button>
        </div>
    </div>

    <!-- Terminal body -->
    <div class="terminal" id="terminal"></div>

    <!-- Status bar -->
    <div class="statusbar">
        <span class="sb-item highlight" id="sbStatus">● Hors ligne</span>
        <span class="sb-item" id="sbCount">0 lignes</span>
        <span class="sb-item" id="sbTime">--:--:--</span>
        <span class="sb-item right">UTF-8 · bot@chouchous</span>
    </div>

</div>

<!-- Scroll pill -->
<button class="scroll-pill" id="scrollPill" onclick="scrollToBottom()">↓ Défiler vers le bas</button>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>
    const terminal   = document.getElementById('terminal');
    const statusDot  = document.getElementById('statusDot');
    const statusLabel= document.getElementById('statusLabel');
    const sbStatus   = document.getElementById('sbStatus');
    const sbCount    = document.getElementById('sbCount');
    const sbTime     = document.getElementById('sbTime');
    const logBadge   = document.getElementById('logCountBadge');
    const scrollPill = document.getElementById('scrollPill');

    let totalLines   = 0;
    let autoScroll   = true;
    let showTs       = false;
    let cursorEl     = null;

    // ── Clock ──
    setInterval(() => {
        sbTime.textContent = new Date().toLocaleTimeString('fr-FR');
    }, 1000);

    // ── Classify ──
    function classify(msg) {
        if (msg.includes('✅') || msg.includes('[SUCCESS]'))                                     return 'success';
        if (msg.includes('❌') || msg.includes('Erreur') || msg.includes('ERROR'))              return 'error';
        if (msg.includes('⚠️') || msg.includes('WARNING'))                                      return 'warning';
        if (msg.includes('[WEB]'))                                                               return 'web';
        if (msg.includes('INFO') || msg.includes('ℹ️'))                                         return 'info';
        if (msg.includes('------') || msg.startsWith('20'))                                     return 'dim';
        return '';
    }

    // ── Render line ──
    function renderLine(msg, isNew) {
        // Remove cursor temporarily
        if (cursorEl) cursorEl.remove();

        totalLines++;
        const cls = classify(msg);
        const now = new Date().toLocaleTimeString('fr-FR');

        const line = document.createElement('div');
        line.className = 'line' + (cls ? ' c-' + cls : '');

        const promptSpan = document.createElement('span');
        promptSpan.className = 'prompt';
        promptSpan.innerHTML =
            '<span class="prompt-user">bot</span>' +
            '<span class="prompt-at">@</span>' +
            '<span class="prompt-host">chouchous</span>' +
            '<span class="prompt-sep">:</span>' +
            '<span class="prompt-path">~</span>' +
            '<span class="prompt-arrow"> $ </span>';

        const msgSpan = document.createElement('span');
        msgSpan.className = 'msg';
        msgSpan.textContent = (showTs ? '[' + now + '] ' : '') + msg;

        line.appendChild(promptSpan);
        line.appendChild(msgSpan);
        terminal.appendChild(line);

        // Re-add cursor
        addCursor();

        updateCounts();

        const atBottom = terminal.scrollHeight - terminal.scrollTop - terminal.clientHeight < 60;
        if (!atBottom && isNew) {
            scrollPill.classList.add('visible');
        }
        if (autoScroll) scrollToBottom();
    }

    function addCursor() {
        const cl = document.createElement('div');
        cl.className = 'cursor-line';

        const p = document.createElement('span');
        p.className = 'prompt';
        p.innerHTML =
            '<span class="prompt-user">bot</span>' +
            '<span class="prompt-at">@</span>' +
            '<span class="prompt-host">chouchous</span>' +
            '<span class="prompt-sep">:</span>' +
            '<span class="prompt-path">~</span>' +
            '<span class="prompt-arrow"> $ </span>';

        const c = document.createElement('span');
        c.className = 'cursor';

        cl.appendChild(p);
        cl.appendChild(c);
        terminal.appendChild(cl);
        cursorEl = cl;
    }

    function updateCounts() {
        const txt = totalLines + ' ligne' + (totalLines !== 1 ? 's' : '');
        sbCount.textContent  = txt;
        logBadge.textContent = txt;
    }

    function scrollToBottom() {
        terminal.scrollTop = terminal.scrollHeight;
        scrollPill.classList.remove('visible');
    }

    terminal.addEventListener('scroll', () => {
        const atBottom = terminal.scrollHeight - terminal.scrollTop - terminal.clientHeight < 60;
        if (atBottom) scrollPill.classList.remove('visible');
    });

    function clearTerminal() {
        terminal.innerHTML = '';
        totalLines = 0;
        cursorEl = null;
        addCursor();
        updateCounts();
    }

    function toggleTimestamps() {
        showTs = !showTs;
        document.getElementById('tsToggle').textContent = '⏱ Timestamps ' + (showTs ? 'ON' : 'OFF');
    }

    // ── Socket.IO ──
    const socket = io();

    socket.on('connect', () => {
        statusDot.classList.add('online');
        statusLabel.textContent = 'Connecté';
        sbStatus.textContent = '● En ligne';
        sbStatus.style.color = '#4ec94e';
    });

    socket.on('disconnect', () => {
        statusDot.classList.remove('online');
        statusLabel.textContent = 'Déconnecté';
        sbStatus.textContent = '● Hors ligne';
        sbStatus.style.color = '#e05c5c';
    });

    socket.on('new_log', (data) => {
        if (data.message && data.message.trim()) {
            renderLine(data.message.trim(), true);
        }
    });

    // Initial cursor
    addCursor();
</script>
</body>
</html>
